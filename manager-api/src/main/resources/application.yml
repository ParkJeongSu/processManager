server:
  port: 11401
spring:
  application:
    name: process-manager
  server:
    shutdown: graceful # 기본값은 immediate(즉시 종료)임. 꼭 graceful로 변경
  lifecycle:
    timeout-per-shutdown-phase: 30s # 30초 동안은 안 죽고 기다려줌 (로직 길면 늘려야 함)
  profiles:
    active: manager # 또는 rabbitmq | scheduler,rabbitmq | dispatcher | pex | tex 등으로 설정 가능
  datasource:
    mssql:
      jdbc-url: jdbc:sqlserver://localhost:1433;databaseName=NEXBEPSM;encrypt=false;
      schema-name: dbo  # MSSQL용 스키마
      username: nexbe
      password: "!aim123456"
#      jdbc-url: jdbc:sqlserver://192.168.50.135:1433;databaseName=NEXBEMNG;encrypt=false;
#      username: nexbe
#      password: "!aim123456"
      driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
      hikari:
        pool-name: mssql-pool
        maximum-pool-size: 20          # ← 최대 커넥션 수
        minimum-idle: 10               # ← 최소 유휴 커넥션 수
        connection-timeout: 30000      # ← 커넥션 획득 대기시간
        idle-timeout: 600000
        max-lifetime: 1800000
        leak-detection-threshold: 2000   # ← ms 단위
    db2:
      jdbc-url: jdbc:db2://localhost:50000/testdb # 실제 DB2 URL로 변경해주세요
      schema-name: TESTDB # Db2용 스키마 (운영 환경에서는 라이브러리명)
      username: db2inst1 # 실제 DB2 계정으로 변경해주세요
      password: 1234 # 실제 DB2 비밀번호로 변경해주세요
      driver-class-name: com.ibm.db2.jcc.DB2Driver
      hikari:
        initialization-fail-timeout: 0
        pool-name: db2-pool
        maximum-pool-size: 20          # ← 최대 커넥션 수
        minimum-idle: 10               # ← 최소 유휴 커넥션 수
        connection-timeout: 30000      # ← 커넥션 획득 대기시간
        idle-timeout: 600000
        max-lifetime: 1800000
        leak-detection-threshold: 2000   # ← ms 단위
  #    db2:
  #      # 1. 프리픽스가 jdbc:as400 으로 바뀝니다.
  #      # 2. 뒤에 옵션들(naming=sql 등)은 JPA를 쓸 때 필수입니다.
  #      jdbc-url: jdbc:as400://[실제_AS400_IP]/[기본_라이브러리명];naming=sql;errors=full;prompt=false;ccsid=933
  #      schema-name: TESTDB # Db2용 스키마 (운영 환경에서는 라이브러리명)
  #      username: [ AS400_계정 ]
  #      password: [ AS400_비밀번호 ]
  #      driver-class-name: com.ibm.as400.access.AS400JDBCDriver # 드라이버 클래스명을 jt400 전용으로 변경합니다.
  #      hikari:
  #        pool-name: as400-pool
  #        maximum-pool-size: 20
  #        minimum-idle: 10
  #        connection-timeout: 30000
  #        idle-timeout: 600000
  #        max-lifetime: 1800000
  #        leak-detection-threshold: 2000
  jpa:
    hibernate:
      jdbc:
        batch_size: 50
      ddl-auto: none # 개발 초기에는 update 또는 create, 운영에서는 none 또는 validate
      order_inserts: true # INSERT 문을 정렬하여 배치 성능 최적화
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        #        format_sql: true # SQL 로그를 예쁘게 포맷팅
        #        highlight_sql: true # ANSI 컬러 하이라이트 (지원 콘솔일 때)
        generate_statistics: true        # 통계 수집 (org.hibernate.stat 로깅과 함께)
    show-sql: true # 실행되는 SQL 쿼리를 로그로 보여줌
  mail:
    host: smtp.naver.com
    port: 587
    username: # userId
    password: # Gmail은 앱 비밀번호 사용 권장
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        concurrency: 10 # 시작 시 생성되는 소비자(consumer) 스레드 수
        max-concurrency: 10 # 부하 증가 시 최대 확장 가능한 소비자 스레드 수
custom:
  rabbitmq:
    exchange:
      pex: "system.direct" # rpc.exchange
      tex: "system.direct"
      dead: "system.direct"      # <- 그대로 유지 (알기 쉬운 이름)
      eas: "system.direct"
      wms: "system.direct"
      wcs: "system.direct"
      manti: "system.direct"
      manager: "system.direct"
    queue:
      pex: "q.pex.request" # PEX.request.queue
      tex: "q.tex.request" # TEX.request.queue
      dead: "DEAD.request.queue"
      eas: "q.eas.request"
      wms: "q.wms.request"
      wcs: "q.wcs.request"
      manti: "q.manti.request"
      manager: "q.manager.request"
    routing:
      pex: "key.pex"
      tex: "key.tex"
      dead: "DEAD.request.queue"           # <- 이 값이 문제의 원인이었지만, 이 이름이 더 좋음!
      eas: "key.eas"
      wms: "key.wms"
      wcs: "key.wcs"
      manti: "key.manti"
      manager: "key.manager"
schedule:
  purge:
    cron: "0 0 2 * * *"
logging:
  level:
    # === Hibernate (Spring Boot 3/Hibernate 6 기준) ===
    org.hibernate.SQL: DEBUG                     # 실행되는 SQL
    org.hibernate.orm.jdbc.bind: TRACE           # 바인드 파라미터 값
    org.hibernate.orm.jdbc.extract: DEBUG        # JDBC 결과 추출(선택)
    org.hibernate.type.descriptor.sql: TRACE     # (버전에 따라) 추가 바인딩 상세
    org.hibernate.stat: DEBUG                    # 2차캐시/쿼리카운트 등 통계 로그
    # === JPA (Spring Data) ===
    org.springframework.orm.jpa: DEBUG           # JPA 트랜잭션 등 프레임워크 레벨
    org.springframework.transaction: DEBUG       # 트랜잭션 경계 로그
    # === HikariCP ===
    #com.zaxxer.hikari: DEBUG                     # 풀 라이프사이클/대여/반납 등 상세
    #com.zaxxer.hikari.pool.HikariPool: DEBUG     # 풀 상태 변화 상세
    com.zaxxer.hikari.HikariConfig: DEBUG        # 구성 파라미터 덤프
    ezieco.eziframe.middleware: DEBUG
    net:
      javacrumbs:
        shedlock: DEBUG
jwt:
  secret: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW5nLXByb2plY3QtdGhhdC1pcy12ZXJ5LWxvbmctYW5kLXNlY3VyZQo=
  access-token-validity-in-seconds: 86400 # 액세스 토큰 만료 시간 (예: 24시간) 86400
  refresh-token-validity-in-seconds: 604800 # 리프레시 토큰 만료 시간 (예: 7일)